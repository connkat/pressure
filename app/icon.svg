<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#09090b"/>

  <!-- Row 1: full bar with chromatic aberration -->
  <rect x="1" y="5" width="26" height="4" fill="#ff0040" opacity="0.6"/>
  <rect x="5" y="5" width="26" height="4" fill="#00e5ff" opacity="0.6"/>
  <rect x="3" y="5" width="26" height="4" fill="#e4e4e7"/>

  <!-- Row 2: broken/displaced bar -->
  <rect x="3" y="12" width="13" height="4" fill="#e4e4e7"/>
  <rect x="16" y="11" width="11" height="4" fill="#e4e4e7"/>
  <rect x="14" y="12" width="6" height="4" fill="#ff0040" opacity="0.7"/>

  <!-- Row 3: bar with cyan ghost -->
  <rect x="3" y="19" width="26" height="4" fill="#e4e4e7"/>
  <rect x="1" y="19" width="9" height="4" fill="#00e5ff" opacity="0.55"/>

  <!-- Row 4: split fragments -->
  <rect x="3" y="26" width="11" height="3" fill="#e4e4e7"/>
  <rect x="19" y="27" width="9" height="3" fill="#e4e4e7" opacity="0.5"/>
  <rect x="16" y="26" width="4" height="3" fill="#ff0040" opacity="0.6"/>
</svg>
